# Prometheus Configuration
# Reference: TDD §12.3

global:
  scrape_interval: 15s
  evaluation_interval: 15s

rule_files:
  - /etc/prometheus/alerts.yml

scrape_configs:
  - job_name: "reconciliation-api"
    static_configs:
      - targets: ["rec_api:8000"]
    metrics_path: /metrics
    scrape_interval: 10s
