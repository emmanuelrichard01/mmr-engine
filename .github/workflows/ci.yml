# .github/workflows/ci.yml
name: Reconciliation Engine CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

env:
  PYTHON_VERSION: "3.12"

jobs:
  lint:
    name: Lint and Type Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install dev dependencies
        run: pip install ruff mypy

      - name: Ruff lint
        run: ruff check src/ tests/

      - name: Ruff format check
        run: ruff format --check src/ tests/

      - name: Mypy type check
        run: mypy src/ --ignore-missing-imports --strict

  test:
    name: Test Suite
    runs-on: ubuntu-latest
    needs: lint

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: reconciliation_test
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: test_password
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install dependencies
        run: pip install -e ".[test]"

      - name: Run migrations on test DB
        run: alembic upgrade head
        env:
          POSTGRES_PIPELINE_DSN: postgresql+asyncpg://postgres:test_password@localhost:5432/reconciliation_test
          POSTGRES_API_DSN: postgresql+asyncpg://postgres:test_password@localhost:5432/reconciliation_test
          POSTGRES_READONLY_DSN: postgresql+asyncpg://postgres:test_password@localhost:5432/reconciliation_test
          MINIO_ACCESS_KEY: test
          MINIO_SECRET_KEY: testtest
          PAYSTACK_SECRET_KEY: sk_test_dummy
          FLUTTERWAVE_SECRET_KEY: FLWSECK_TEST-dummy
          FLUTTERWAVE_SECRET_HASH: test_hash
          FX_PROVIDER_API_KEY: test_key

      - name: Run unit tests
        run: |
          pytest tests/unit/ -v \
            --tb=short \
            --cov=src \
            --cov-report=term-missing \
            --cov-report=xml

      - name: Run integration tests
        run: |
          pytest tests/integration/ -v \
            --tb=short \
            --asyncio-mode=auto
        env:
          POSTGRES_PIPELINE_DSN: postgresql+asyncpg://postgres:test_password@localhost:5432/reconciliation_test
          POSTGRES_API_DSN: postgresql+asyncpg://postgres:test_password@localhost:5432/reconciliation_test
          POSTGRES_READONLY_DSN: postgresql+asyncpg://postgres:test_password@localhost:5432/reconciliation_test
          MINIO_ACCESS_KEY: test
          MINIO_SECRET_KEY: testtest
          PAYSTACK_SECRET_KEY: sk_test_dummy
          FLUTTERWAVE_SECRET_KEY: FLWSECK_TEST-dummy
          FLUTTERWAVE_SECRET_HASH: test_hash
          FX_PROVIDER_API_KEY: test_key

      - name: Run contract tests
        run: |
          pytest tests/contracts/ -v \
            --tb=short
        env:
          POSTGRES_PIPELINE_DSN: postgresql+asyncpg://postgres:test_password@localhost:5432/reconciliation_test
          POSTGRES_API_DSN: postgresql+asyncpg://postgres:test_password@localhost:5432/reconciliation_test
          POSTGRES_READONLY_DSN: postgresql+asyncpg://postgres:test_password@localhost:5432/reconciliation_test
          MINIO_ACCESS_KEY: test
          MINIO_SECRET_KEY: testtest
          PAYSTACK_SECRET_KEY: sk_test_dummy
          FLUTTERWAVE_SECRET_KEY: FLWSECK_TEST-dummy
          FLUTTERWAVE_SECRET_HASH: test_hash
          FX_PROVIDER_API_KEY: test_key

      - name: Security scan
        run: python scripts/security_check.py

  docker:
    name: Docker Build Validation
    runs-on: ubuntu-latest
    needs: test

    steps:
      - uses: actions/checkout@v4

      - name: Build all Docker stages
        run: |
          docker build --target api -t rec-api:ci .
          docker build --target worker -t rec-worker:ci .
          docker build --target migrations -t rec-migrations:ci .

      - name: Validate Compose stack
        run: |
          cp .env.example .env
          docker compose config --quiet
          echo "Docker Compose configuration is valid"

  dashboard:
    name: Dashboard Build
    runs-on: ubuntu-latest
    needs: lint

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install dependencies
        run: cd dashboard && npm install

      - name: Build dashboard
        run: cd dashboard && npm run build

      - name: Lint dashboard
        run: cd dashboard && npm run lint || true
