# Alembic Configuration — Cross-Border Reconciliation Engine

[alembic]
# Path to migration scripts
script_location = alembic

# Template used to generate migration files
file_template = %%(rev)s_%%(slug)s

# Timezone for migration timestamps
timezone = UTC

# Truncate revision ID to just the first 12 characters
truncate_slug_length = 40

# Set to true to run "revision --autogenerate" and check for
# tables/columns no longer in the model
# compare_type = true

# Database URL is set programmatically in env.py via src/config.py
# sqlalchemy.url is intentionally left blank here
# sqlalchemy.url =

[post_write_hooks]

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
