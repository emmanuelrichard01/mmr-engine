# docker-compose.test.yml — Isolated test environment
# Usage: docker compose -f docker-compose.test.yml up -d
#
# Reference: QA §3.1

name: reconciliation-test

services:
  postgres_test:
    image: postgres:16-alpine
    container_name: rec_postgres_test
    environment:
      POSTGRES_DB: reconciliation_test
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: test_password
    ports:
      - "5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d reconciliation_test"]
      interval: 5s
      timeout: 3s
      retries: 5
    tmpfs:
      - /var/lib/postgresql/data  # RAM-backed for speed
    networks:
      - test_internal

  redpanda_test:
    image: redpandadata/redpanda:v23.3.21
    container_name: rec_redpanda_test
    command:
      - redpanda
      - start
      - --kafka-addr 0.0.0.0:9092
      - --advertise-kafka-addr redpanda_test:9092
      - --mode dev-container
      - --smp 1
      - --memory 256M
      - --reserve-memory 0M
      - --check=false
    ports:
      - "19093:9092"
    networks:
      - test_internal

networks:
  test_internal:
    driver: bridge
