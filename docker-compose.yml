# docker-compose.yml — Core Services
# Cross-Border Mobile Money Reconciliation Engine
#
# Reference: TDD §5

name: reconciliation-engine

services:

  # ── PostgreSQL 16 ────────────────────────────────────────────────────────
  postgres:
    image: postgres:16
    container_name: rec_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: reconciliation
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${POSTGRES_SUPERUSER_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./scripts/init_postgres.sql:/docker-entrypoint-initdb.d/01_init.sql
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d reconciliation"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - rec_internal

  # ── Redpanda (Kafka-compatible) ───────────────────────────────────────────
  redpanda:
    image: redpandadata/redpanda:v23.3.21
    container_name: rec_redpanda
    restart: unless-stopped
    command:
      - redpanda
      - start
      - --kafka-addr internal://0.0.0.0:9092,external://0.0.0.0:19092
      - --advertise-kafka-addr internal://redpanda:9092,external://localhost:19092
      - --pandaproxy-addr internal://0.0.0.0:8082,external://0.0.0.0:18082
      - --advertise-pandaproxy-addr internal://redpanda:8082,external://localhost:18082
      - --schema-registry-addr internal://0.0.0.0:8081,external://0.0.0.0:18081
      - --rpc-addr redpanda:33145
      - --advertise-rpc-addr redpanda:33145
      - --mode dev-container
      - --smp 1
      - --memory 512M
      - --reserve-memory 0M
      - --node-id 0
      - --check=false
    volumes:
      - redpanda_data:/var/lib/redpanda/data
    ports:
      - "19092:19092"   # External Kafka access for local tools
      - "18082:18082"   # Pandaproxy
      - "18081:18081"   # Schema registry
    healthcheck:
      test: ["CMD-SHELL", "rpk cluster health | grep -q 'Healthy:.*true' || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 30s
    networks:
      - rec_internal

  # ── Redpanda Console (UI for Kafka topics) ────────────────────────────────
  redpanda_console:
    image: redpandadata/console:v2.7.2
    container_name: rec_redpanda_console
    restart: unless-stopped
    environment:
      CONFIG_FILEPATH: /tmp/config.yml
    volumes:
      - ./infra/redpanda/console_config.yml:/tmp/config.yml
    ports:
      - "8080:8080"
    depends_on:
      redpanda:
        condition: service_healthy
    networks:
      - rec_internal

  # ── MinIO ─────────────────────────────────────────────────────────────────
  minio:
    image: minio/minio:RELEASE.2024-05-01T01-11-10Z
    container_name: rec_minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ACCESS_KEY}
      MINIO_ROOT_PASSWORD: ${MINIO_SECRET_KEY}
    volumes:
      - minio_data:/data
    ports:
      - "9000:9000"   # API
      - "9001:9001"   # Console
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s
    networks:
      - rec_internal

  # ── MinIO Init (creates buckets and applies Object Lock) ──────────────────
  minio_init:
    image: minio/mc:latest
    container_name: rec_minio_init
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
        mc alias set local http://minio:9000 $$MINIO_ACCESS_KEY $$MINIO_SECRET_KEY &&
        mc mb --ignore-existing local/reconciliation-bronze &&
        mc retention set --default COMPLIANCE 7d local/reconciliation-bronze &&
        echo 'MinIO initialised successfully'
      "
    environment:
      MINIO_ACCESS_KEY: ${MINIO_ACCESS_KEY}
      MINIO_SECRET_KEY: ${MINIO_SECRET_KEY}
    networks:
      - rec_internal

  # ── FastAPI Gateway ───────────────────────────────────────────────────────
  api:
    build:
      context: .
      dockerfile: Dockerfile
      target: api
    container_name: rec_api
    restart: unless-stopped
    environment:
      - ENVIRONMENT=${ENVIRONMENT}
      - POSTGRES_PIPELINE_DSN=${POSTGRES_PIPELINE_DSN}
      - POSTGRES_API_DSN=${POSTGRES_API_DSN}
      - POSTGRES_READONLY_DSN=${POSTGRES_READONLY_DSN}
      - KAFKA_BOOTSTRAP_SERVERS=redpanda:9092
      - MINIO_ACCESS_KEY=${MINIO_ACCESS_KEY}
      - MINIO_SECRET_KEY=${MINIO_SECRET_KEY}
      - MINIO_ENDPOINT=minio:9000
      - PAYSTACK_SECRET_KEY=${PAYSTACK_SECRET_KEY}
      - FLUTTERWAVE_SECRET_KEY=${FLUTTERWAVE_SECRET_KEY}
      - FLUTTERWAVE_SECRET_HASH=${FLUTTERWAVE_SECRET_HASH}
      - FX_PROVIDER_API_KEY=${FX_PROVIDER_API_KEY}
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redpanda:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 20s
    networks:
      - rec_internal

  # ── Prefect Server ────────────────────────────────────────────────────────
  prefect_server:
    image: prefecthq/prefect:3-latest
    container_name: rec_prefect_server
    restart: unless-stopped
    command: prefect server start --host 0.0.0.0
    environment:
      PREFECT_SERVER_API_HOST: 0.0.0.0
      PREFECT_API_DATABASE_CONNECTION_URL: postgresql+asyncpg://postgres:${POSTGRES_SUPERUSER_PASSWORD}@postgres:5432/prefect
    ports:
      - "4200:4200"
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - rec_internal

  # ── Prefect Worker ────────────────────────────────────────────────────────
  prefect_worker:
    build:
      context: .
      dockerfile: Dockerfile
      target: worker
    container_name: rec_prefect_worker
    restart: unless-stopped
    command: prefect worker start --pool reconciliation-pool
    environment:
      - PREFECT_API_URL=http://prefect_server:4200/api
      - POSTGRES_PIPELINE_DSN=${POSTGRES_PIPELINE_DSN}
      - POSTGRES_API_DSN=${POSTGRES_API_DSN}
      - POSTGRES_READONLY_DSN=${POSTGRES_READONLY_DSN}
      - KAFKA_BOOTSTRAP_SERVERS=redpanda:9092
      - MINIO_ENDPOINT=minio:9000
      - MINIO_ACCESS_KEY=${MINIO_ACCESS_KEY}
      - MINIO_SECRET_KEY=${MINIO_SECRET_KEY}
      - FX_PROVIDER_API_KEY=${FX_PROVIDER_API_KEY}
      - PAYSTACK_SECRET_KEY=${PAYSTACK_SECRET_KEY}
      - FLUTTERWAVE_SECRET_KEY=${FLUTTERWAVE_SECRET_KEY}
      - FLUTTERWAVE_SECRET_HASH=${FLUTTERWAVE_SECRET_HASH}
      - SLACK_WEBHOOK_URL=${SLACK_WEBHOOK_URL}
    depends_on:
      prefect_server:
        condition: service_started
      postgres:
        condition: service_healthy
      redpanda:
        condition: service_healthy
      minio:
        condition: service_healthy
    volumes:
      - ./dbt_project:/app/dbt_project
      - duckdb_data:/data/analytics
    networks:
      - rec_internal

  # ── Alembic Migrations (runs once on startup) ──────────────────────────────
  migrations:
    build:
      context: .
      dockerfile: Dockerfile
      target: migrations
    container_name: rec_migrations
    command: alembic upgrade head
    environment:
      POSTGRES_PIPELINE_DSN: ${POSTGRES_PIPELINE_DSN}
      POSTGRES_API_DSN: ${POSTGRES_API_DSN}
      POSTGRES_READONLY_DSN: ${POSTGRES_READONLY_DSN}
      MINIO_ACCESS_KEY: ${MINIO_ACCESS_KEY}
      MINIO_SECRET_KEY: ${MINIO_SECRET_KEY}
      PAYSTACK_SECRET_KEY: ${PAYSTACK_SECRET_KEY}
      FLUTTERWAVE_SECRET_KEY: ${FLUTTERWAVE_SECRET_KEY}
      FLUTTERWAVE_SECRET_HASH: ${FLUTTERWAVE_SECRET_HASH}
      FX_PROVIDER_API_KEY: ${FX_PROVIDER_API_KEY}
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - rec_internal
    restart: "no"

  # ── Dashboard (Next.js) ──────────────────────────────────────────────────
  dashboard:
    build:
      context: ./dashboard
      dockerfile: Dockerfile
    container_name: rec_dashboard
    restart: unless-stopped
    environment:
      - NEXT_PUBLIC_API_URL=http://api:8000
    ports:
      - "3000:3000"
    depends_on:
      api:
        condition: service_healthy
    networks:
      - rec_internal

volumes:
  postgres_data:
  redpanda_data:
  minio_data:
  duckdb_data:

networks:
  rec_internal:
    driver: bridge

